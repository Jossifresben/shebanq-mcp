name: emdros-tests

# Builds Emdros (SQLite backend + Python bindings) from source, builds the BHSA
# SQLite database from the ETCBC 2021 MQL dump, and runs the Emdros-backed tests.
# The first runs are partly a probe: the diagnostic steps (find/probe/versions)
# are non-fatal so one run surfaces the module name, mql syntax, and real counts.

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  emdros:
    runs-on: ubuntu-latest
    env:
      EMDROS_TAG: "rel-3-9-0"
      MQL_URL: "https://github.com/ETCBC/bhsa/raw/4db00e2157915495e1a4d3d57e41223df24775da/shebanq/2021/shebanq_etcbc2021.mql.bz2"
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3-dev swig \
            autoconf automake libtool gettext pkg-config \
            re2c bison flex imagemagick graphviz \
            libpcre3-dev libsqlite3-dev bzip2 wget ca-certificates

      # Emdros is built into a user-writable prefix (~/.local/emdros) so the
      # build can be cached: actions/cache restores as the unprivileged runner
      # user and cannot write the root-owned /usr/local the build used to target.
      # The build is deterministic for a source tag + runner OS, so a cache hit
      # skips the ~5-6 min compile entirely. The next step sets PATH /
      # LD_LIBRARY_PATH / PYTHONPATH to the prefix instead of relying on ldconfig.
      - name: Cache the Emdros build
        id: cache-emdros
        uses: actions/cache@v4
        with:
          path: ~/.local/emdros
          # Bump the -vN suffix to force a rebuild if a runner image change ever
          # breaks the cached binaries (they link against system libpcre/sqlite).
          key: emdros-${{ env.EMDROS_TAG }}-${{ runner.os }}-v1

      - name: Build and install Emdros (SQLite + Python3 bindings)
        if: steps.cache-emdros.outputs.cache-hit != 'true'
        run: |
          set -x
          PREFIX="$HOME/.local/emdros"
          mkdir -p "$PREFIX/bin"
          # A nested EQT (query-tool) user guide tries to build a PDF via
          # pdflatex, which we neither have nor need. Stub it so the rule
          # produces an (empty) .pdf and succeeds, instead of pulling in LaTeX.
          # In the prefix bin (no sudo) and on PATH for the build only.
          printf '%s\n' '#!/bin/sh' 'for a in "$@"; do case "$a" in *.tex) : > "${a%.tex}.pdf";; esac; done' 'exit 0' \
            > "$PREFIX/bin/pdflatex"
          chmod +x "$PREFIX/bin/pdflatex"
          export PATH="$PREFIX/bin:$PATH"
          wget --tries=3 --timeout=30 -O emdros.tar.gz \
            "https://github.com/emdros/emdros/archive/refs/tags/${EMDROS_TAG}.tar.gz"
          tar xzf emdros.tar.gz
          cd "emdros-${EMDROS_TAG}"
          # A git archive ships no generated configure; bootstrap autotools.
          ( [ -f autogen.sh ] && sh autogen.sh ) || autoreconf -fi
          ./configure --prefix="$PREFIX" \
            --with-sqlite3=yes \
            --with-mysql=no \
            --with-postgresql=no \
            --with-wx=no \
            --with-swig-language-python3=yes \
            --with-swig-language-python2=no \
            --with-swig-language-java=no \
            --with-swig-language-csharp=no \
            --with-swig-language-php7=no \
            --disable-debug
          # Drop the 'doc' subdir: it builds a LaTeX PDF user guide we do not
          # need and which pulls in a heavy toolchain. Everything we use (MQL,
          # src, SWIG python bindings) lives in later SUBDIRS.
          sed -i -E 's/^(SUBDIRS *= *)doc /\1/' Makefile
          grep -E '^SUBDIRS' Makefile | head -3
          make -j"$(nproc)"
          make install

      - name: Set up Emdros on PATH / LD_LIBRARY_PATH / PYTHONPATH
        run: |
          # Runs whether Emdros was freshly built or restored from cache. The
          # SWIG python wrapper installs as EmdrosPy3.py + _EmdrosPy3.so under
          # $PREFIX/lib/emdros; libs under $PREFIX/lib; the mql binary in bin.
          PREFIX="$HOME/.local/emdros"
          echo "=== emdros prefix contents ==="
          find "$PREFIX" -maxdepth 3 -iname '*emdros*' 2>/dev/null | head -40 || true
          PYFILE="$(find "$PREFIX" -iname 'EmdrosPy3.py' 2>/dev/null | head -1)"
          EMDROS_PYDIR="${PYFILE:+$(dirname "$PYFILE")}"
          [ -z "$EMDROS_PYDIR" ] && EMDROS_PYDIR="$PREFIX/lib/emdros"
          echo "$PREFIX/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=$PREFIX/lib" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$EMDROS_PYDIR" >> "$GITHUB_ENV"
          echo "Emdros module dir: $EMDROS_PYDIR"
          ls -la "$EMDROS_PYDIR" || true

      - name: Install the package
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Probe Emdros import (diagnostic, non-fatal)
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import importlib
          for name in ("emdros", "EmdrosPy3", "EmdrosPy"):
              try:
                  m = importlib.import_module(name)
                  syms = [a for a in dir(m) if ("Env" in a or "BACKEND" in a or a.startswith("kC") or a.startswith("kOK"))]
                  print("IMPORT OK:", name, "-> relevant symbols:", syms[:20])
              except Exception as e:
                  print("import failed:", name, repr(e))
          PY

      - name: Download and build BHSA SQLite database
        run: |
          mkdir -p data
          wget -q -O data/bhsa.mql.bz2 "$MQL_URL"
          bunzip2 -kf data/bhsa.mql.bz2
          ls -la data/
          echo "=== mql version ==="
          mql --version 2>&1 | head -5 || true
          echo "=== building sqlite db ==="
          # The dump contains `CREATE DATABASE 'shebanq_etcbc2021'`, so mql writes
          # the populated SQLite file under that internal name (in the cwd), not
          # the -d path. Run it, then relocate the real file to data/bhsa.sqlite3.
          mql --backend sqlite3 -d data/bhsa.sqlite3 data/bhsa.mql
          echo "=== locate populated db ==="
          ls -la
          find . -maxdepth 2 \( -name 'shebanq_etcbc2021*' -o -name '*.sqlite3' -o -name '*.db' \) ! -name '*.mql*' 2>/dev/null
          if [ ! -s data/bhsa.sqlite3 ]; then
            DBFILE="$(find . -maxdepth 2 -name 'shebanq_etcbc2021*' ! -name '*.mql*' | head -1)"
            echo "Relocating populated DB: $DBFILE -> data/bhsa.sqlite3"
            mv "$DBFILE" data/bhsa.sqlite3
          fi
          ls -la data/
          test -s data/bhsa.sqlite3

      - name: Run Emdros-backed tests
        env:
          BHSA_SQLITE: data/bhsa.sqlite3
        run: |
          python3 -m pytest -m emdros -v

      - name: Print fixture counts (for pinning)
        if: always()
        env:
          BHSA_SQLITE: data/bhsa.sqlite3
        run: python3 scripts/run_constructs.py

      - name: Print real featured-search counts (diagnostic)
        if: always()
        env:
          BHSA_SQLITE: data/bhsa.sqlite3
        run: |
          python3 - <<'PY'
          import json
          from shebanq_mcp.runner import run_query
          cases = json.load(open("tests/fixtures/featured_searches.json"))
          for c in cases:
              try:
                  n = run_query(c["mql"], "data/bhsa.sqlite3").count
                  print(f"COUNT {c['id']}: {n}")
              except Exception as e:
                  print(f"COUNT {c['id']}: ERROR {e!r}")
          PY

      - name: Introspect section object features (diagnostic, for refs)
        if: always()
        env:
          BHSA_SQLITE: data/bhsa.sqlite3
        run: |
          python3 - <<'PY'
          from shebanq_mcp.runner import _import_emdros
          e = _import_emdros()
          env = e.EmdrosEnv(e.kOKConsole, e.kCSUTF8, "", "", "", "data/bhsa.sqlite3", e.kSQLite3)
          for ot in ("verse", "chapter", "book"):
              print(f"===== FEATURES OF {ot} =====")
              env.executeString(f"SELECT FEATURES FROM OBJECT TYPE [{ot}] GO", True, True, True)
          PY

      - name: Extract showcase data
        if: always()
        env:
          BHSA_SQLITE: data/bhsa.sqlite3
        run: |
          mkdir -p demo
          python3 scripts/extract_showcase.py data/bhsa.sqlite3 > demo/showcase.json
          echo "=== showcase.json head ==="
          head -40 demo/showcase.json

      - name: Upload showcase data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: showcase
          path: demo/showcase.json
