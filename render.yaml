# Sized from the CI measurement (docker-smoke, 2026-06-09): peak ~154 MiB under
# 2 concurrent queries, cold start ~2.2s. Both services run on the `starter` tier
# (512 MB, always-on) so the first request after an idle spell is instant, no
# spin-down. The smoke counts depend on the pinned BHSA_REF.
services:
  - type: web
    name: shebanq-mcp
    runtime: docker
    plan: starter             # 512 MB, always-on; measured peak ~154 MiB at 2 concurrent
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: MCP_TRANSPORT
        value: http
      # Server-side NL->MQL translation: search_bhsa answers directly over MCP.
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-sonnet-4-6   # chosen by the benchmark: 11/11, ~2.3x cheaper than Opus
      - key: LLM_RATE_PER_MIN
        value: "20"            # throttle the paid translation path; the spend cap is the ceiling
      - key: ANTHROPIC_API_KEY
        sync: false            # set in the Render dashboard; scoped to the $10-capped workspace
      - key: BHSA_SQLITE
        value: /app/data/bhsa.sqlite3
      - key: QUERY_TIMEOUT_SECONDS
        value: "15"
      - key: MAX_CONCURRENT_QUERIES
        value: "2"            # ~75 MiB/query; 2 fits the 512 MB tier with headroom
      # Cap results returned per response (result_count still reports the true
      # total). A broad query can match thousands of objects; this keeps a
      # conversational client's context from being flooded.
      - key: MAX_RESULTS
        value: "100"
      # Keep FastMCP's DNS-rebinding/Host protection ON, admitting only this
      # public host (anything else is rejected with 421). Add a comma-separated
      # host here if a custom domain is added later.
      - key: MCP_ALLOWED_HOSTS
        value: shebanq-mcp.onrender.com

  # The live demo: same image, LLM enabled, serves the page + /api/* same-origin.
  - type: web
    name: shebanq-web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: WEB_API
        value: "on"
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false            # set in the Render dashboard; scoped to the $10-capped workspace
      - key: MCP_TRANSPORT
        value: http
      - key: BHSA_SQLITE
        value: /app/data/bhsa.sqlite3
      - key: QUERY_TIMEOUT_SECONDS
        value: "15"
      - key: MAX_CONCURRENT_QUERIES
        value: "2"
      - key: MAX_RESULTS
        value: "100"
      - key: WEB_RATE_PER_MIN
        value: "10"
      # The web host (its /mcp is unused; spend is bounded by the Anthropic cap).
      - key: MCP_ALLOWED_HOSTS
        value: shebanq-web.onrender.com
