# Instance size and lifecycle are PROVISIONAL. After CI measures peak memory
# and cold-start time, either keep this always-on `standard` size or switch to
# a scale-to-zero option (see docs/specs/2026-06-09-mcp-deploy-design.md,
# "Instance lifecycle"). The smoke counts depend on the pinned BHSA_REF.
services:
  - type: web
    name: shebanq-mcp
    runtime: docker
    plan: standard            # ~2GB; confirm vs the CI memory measurement
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: LLM_PROVIDER
        value: none
      - key: BHSA_SQLITE
        value: /app/data/bhsa.sqlite3
      - key: QUERY_TIMEOUT_SECONDS
        value: "15"
      - key: MAX_CONCURRENT_QUERIES
        value: "2"            # conservative until memory is measured
